services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator_dev
      POSTGRES_DB: llm_aggregator
    ports:
      - "5433:5432" # avoid conflicts with other local PG instances
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator -d llm_aggregator"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379" # avoid conflicts with other local Redis instances
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
